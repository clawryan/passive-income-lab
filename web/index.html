<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orion Nexus Quant Terminal</title>
  <style>
    body{font-family:Inter,system-ui,-apple-system,sans-serif;margin:0;background:#0a0f1e;color:#e8efff}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    .grid{display:grid;gap:14px}
    .g2{grid-template-columns:1fr 1fr}
    .card{background:#141c34;border:1px solid #25335f;border-radius:12px;padding:14px}
    h1,h2{margin:0 0 10px}
    input,select,button{padding:10px;border-radius:8px;border:1px solid #2a3a67;background:#0f1730;color:#e8efff}
    button{background:#3a7bff;cursor:pointer}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #25335f;text-align:left;font-size:13px}
    .muted{opacity:.7;font-size:12px}
    .good{color:#7ef0ba}.bad{color:#ff9ca9}
  </style>
</head>
<body>
  <div class="wrap grid">
    <div class="card">
      <h1>Orion Nexus Quant · Portfolio Monitor</h1>
      <div class="muted">机构风格：自动选股、策略切换、组合监控、基准比较（研究/模拟）</div>
      <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
        <input id="universe" value="AAPL,NVDA,MSFT,AMZN,META,TSLA" style="min-width:320px"/>
        <select id="strategy">
          <option value="sma">SMA</option>
          <option value="momentum">Momentum</option>
          <option value="meanrev">MeanReversion</option>
        </select>
        <select id="topN"><option>3</option><option>4</option><option>5</option></select>
        <button id="run">运行自动选股</button>
        <span id="status" class="muted"></span>
      </div>
    </div>

    <div class="grid g2">
      <div class="card" id="portfolioCard"><h2>组合概览</h2><div class="muted">等待运行</div></div>
      <div class="card" id="benchmarkCard"><h2>基准比较</h2><div class="muted">等待运行</div></div>
    </div>

    <div class="card" id="selectedCard"><h2>入选证券与触发原因</h2><div class="muted">等待运行</div></div>
    <div class="card" id="universeCard"><h2>全池监控</h2><div class="muted">等待运行</div></div>
  </div>

<script>
const $=id=>document.getElementById(id);
const pct=x=>`${(x*100).toFixed(2)}%`;
const cls=x=>x>=0?'good':'bad';

async function run(){
  const universe=$("universe").value.trim();
  const strategy=$("strategy").value;
  const topN=$("topN").value;
  $("status").textContent='运行中...';
  try{
    const r=await fetch(`/api/portfolio?universe=${encodeURIComponent(universe)}&strategy=${strategy}&topN=${topN}`);
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'请求失败');
    $("status").textContent='完成';

    $("portfolioCard").innerHTML=`<h2>组合概览</h2>
      <div>Holdings: <b>${d.portfolio.holdings.join(', ')||'N/A'}</b></div>
      <div class="${cls(d.portfolio.total_return)}">Total Return: ${pct(d.portfolio.total_return)}</div>
      <div>Sharpe: ${d.portfolio.sharpe.toFixed(2)}</div>
      <div>Max Drawdown: ${pct(d.portfolio.max_drawdown)}</div>`;

    $("benchmarkCard").innerHTML=`<h2>基准比较（同区间）</h2>
      <div class="${cls(d.benchmark.SPY)}">SPY: ${pct(d.benchmark.SPY)}</div>
      <div class="${cls(d.benchmark.QQQ)}">QQQ: ${pct(d.benchmark.QQQ)}</div>
      <div class="muted">目标：组合收益持续优于基准并控制回撤</div>`;

    const selRows=d.selected.map(x=>`<tr>
      <td>${x.symbol}</td><td>${x.reason}</td>
      <td class="${cls(x.total_return)}">${pct(x.total_return)}</td>
      <td>${x.sharpe.toFixed(2)}</td><td>${pct(x.max_drawdown)}</td>
      <td>${pct(x.win_rate)}</td><td>${x.trades}</td>
      <td>${x.latest_price?.toFixed?.(2) ?? ''}</td><td>${x.latest_time||''}</td>
    </tr>`).join('');
    $("selectedCard").innerHTML=`<h2>入选证券与触发原因</h2>
      <table><thead><tr><th>Symbol</th><th>Reason</th><th>Return</th><th>Sharpe</th><th>MDD</th><th>WinRate</th><th>Trades</th><th>Price</th><th>Time</th></tr></thead><tbody>${selRows||'<tr><td colspan="9">无</td></tr>'}</tbody></table>`;

    const allRows=d.universe_metrics.map(x=> x.error
      ? `<tr><td>${x.symbol}</td><td colspan="8" class="bad">${x.error}</td></tr>`
      : `<tr><td>${x.symbol}</td><td>${x.reason}</td><td class="${cls(x.total_return)}">${pct(x.total_return)}</td><td>${x.sharpe.toFixed(2)}</td><td>${pct(x.max_drawdown)}</td><td>${pct(x.win_rate)}</td><td>${x.trades}</td><td>${x.latest_price.toFixed(2)}</td><td>${x.latest_time}</td></tr>`
    ).join('');
    $("universeCard").innerHTML=`<h2>全池监控</h2>
      <table><thead><tr><th>Symbol</th><th>Signal</th><th>Return</th><th>Sharpe</th><th>MDD</th><th>WinRate</th><th>Trades</th><th>Price</th><th>Time</th></tr></thead><tbody>${allRows}</tbody></table>`;
  }catch(e){$("status").textContent='失败: '+e.message;}
}

$("run").addEventListener('click',run);
</script>
</body>
</html>
